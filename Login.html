<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HostelMart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #FDFBF7;
        }

        .glass-card {
            background: rgba(245, 245, 220, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(215, 204, 200, 0.3);
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(93, 64, 55, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Branding -->
    <div class="absolute top-8 left-8">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-[#5D4037]">
            <span class="text-[#8D6E63]">Hostel</span><span class="text-[#C8A951] ml-1">Mart</span>
        </a>
    </div>

    <div class="max-w-md w-full glass-card rounded-[2.5rem] p-8 md:p-12 shadow-2xl shadow-[#5D4037]/10 animate-fade-in">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-black text-[#5D4037] mb-2">Welcome Back</h1>
            <p class="text-[#795548] text-sm font-medium">Verify your identity to continue</p>
        </div>

        <!-- Step 1: Email/Phone Input -->
        <div id="step-1" class="space-y-6">
            <div class="space-y-2">
                <label for="identifier" class="text-xs font-bold uppercase tracking-widest text-[#5D4037] ml-1">Email or Phone Number</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl text-[#795548]">
                        <ion-icon name="mail-outline"></ion-icon>
                    </span>
                    <input type="text" id="identifier" placeholder="name@college.edu"
                        class="w-full bg-white/50 border border-[#D7CCC8] rounded-2xl pl-12 pr-4 py-4 outline-none focus:bg-white focus:border-[#5D4037] transition-all input-focus text-sm font-medium">
                </div>
            </div>

            <button onclick="handleIdentityCheck()"
                class="w-full bg-[#5D4037] text-[#F5F5DC] font-black py-4 rounded-2xl shadow-lg shadow-[#5D4037]/20 hover:bg-[#3E2723] hover:translate-y-[-2px] active:scale-95 transition-all flex items-center justify-center gap-2">
                <span>Continue</span>
                <ion-icon name="arrow-forward-outline" class="text-xl"></ion-icon>
            </button>
        </div>

        <!-- Step 2: OTP Input (Hidden by default) -->
        <div id="step-2" class="space-y-6 hidden">
            <div class="space-y-2 text-center">
                <p class="text-xs font-bold uppercase tracking-widest text-[#5D4037]">Enter 4-digit Code</p>
                <p class="text-[#795548] text-xs">Sent to <span id="display-identifier" class="font-bold"></span></p>
                <div class="flex justify-center gap-3 mt-4">
                    <input type="text" maxlength="1" class="w-14 h-16 bg-white/50 border border-[#D7CCC8] rounded-2xl text-center text-2xl font-black focus:border-[#5D4037] focus:bg-white transition-all outline-none">
                    <input type="text" maxlength="1" class="w-14 h-16 bg-white/50 border border-[#D7CCC8] rounded-2xl text-center text-2xl font-black focus:border-[#5D4037] focus:bg-white transition-all outline-none">
                    <input type="text" maxlength="1" class="w-14 h-16 bg-white/50 border border-[#D7CCC8] rounded-2xl text-center text-2xl font-black focus:border-[#5D4037] focus:bg-white transition-all outline-none">
                    <input type="text" maxlength="1" class="w-14 h-16 bg-white/50 border border-[#D7CCC8] rounded-2xl text-center text-2xl font-black focus:border-[#5D4037] focus:bg-white transition-all outline-none">
                </div>
            </div>

            <button onclick="handleLogin()"
                class="w-full bg-[#5D4037] text-[#F5F5DC] font-black py-4 rounded-2xl shadow-lg shadow-[#5D4037]/20 hover:bg-[#3E2723] hover:translate-y-[-2px] active:scale-95 transition-all">
                Verify & Login
            </button>

            <button onclick="backToStep1()" class="w-full text-[#795548] text-xs font-bold uppercase tracking-widest hover:text-[#5D4037] transition-colors">
                Change Email / Phone
            </button>
        </div>

        <!-- Footer Links -->
        <div class="mt-12 text-center space-y-4">
            <p class="text-[#795548] text-xs font-medium">New to HostelMart? <a href="#" class="text-[#5D4037] font-black hover:underline">Create Account</a></p>
            <div class="flex items-center justify-center gap-4 text-gray-400 text-lg">
                <ion-icon name="logo-google" class="cursor-pointer hover:text-[#DB4437] transition-colors"></ion-icon>
                <ion-icon name="logo-apple" class="cursor-pointer hover:text-black transition-colors"></ion-icon>
                <ion-icon name="logo-facebook" class="cursor-pointer hover:text-[#1877F2] transition-colors"></ion-icon>
            </div>
        </div>
    </div>

    <script>
        function handleIdentityCheck() {
            const identifier = document.getElementById('identifier').value;
            if (!identifier) {
                alert('Please enter your email or phone number');
                return;
            }

            // Simple transition for demo
            document.getElementById('display-identifier').innerText = identifier;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
            document.getElementById('step-2').classList.add('animate-fade-in');
        }

        function handleLogin() {
            // Mock login logic
            localStorage.setItem('user_logged_in', 'true');
            window.location.href = 'index.html';
        }

        function backToStep1() {
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-1').classList.add('animate-fade-in');
        }

        // Auto-focus logic for OTP inputs
        const inputs = document.querySelectorAll('#step-2 input[type="text"]');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                } else if (e.key === 'Backspace') {
                    if (index > 0) inputs[index - 1].focus();
                }
            });
        });
    </script>

</body>

</html>
